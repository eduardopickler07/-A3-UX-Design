<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

        /* =============================================
           NOTÍCIAS PAGE — ESTILOS EXCLUSIVOS
        ============================================= */

        /* Navbar active state */
        .nav-link.active-page {
            color: #ff4fd8 !important;
            font-weight: 600;
        }

        /* Back button */
        .news-page-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.88rem;
            text-decoration: none;
            transition: color 0.2s;
            padding: 4px 0;
        }
        .news-page-back:hover { color: white; }
        .news-page-back i { font-size: 0.8rem; }

        /* Page header icons */
        .news-page-header-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .news-page-icon-btn {
            background: #22222e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .news-page-icon-btn:hover,
        .news-page-icon-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
        }

        /* Search bar */
        .news-search-wrap {
            position: relative;
            margin: 20px 0 24px;
        }
        .news-search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 0.95rem;
            pointer-events: none;
        }
        .news-search-input {
            width: 100%;
            background: #22222e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: white;
            font-size: 0.92rem;
            padding: 14px 20px 14px 46px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .news-search-input::placeholder { color: rgba(255,255,255,0.3); }
        .news-search-input:focus {
            border-color: rgba(168,85,247,0.5);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.1);
        }

        /* Filter pills */
        .news-page-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .news-page-filter-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            border-radius: 999px;
            padding: 6px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .news-page-filter-btn:hover {
            border-color: #a855f7;
            color: white;
            background: rgba(168,85,247,0.12);
        }
        .news-page-filter-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
            font-weight: 600;
        }

        /* Count label */
        .news-count-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .news-count-label strong {
            color: white;
            font-weight: 700;
        }

        /* News grid cards */
        .news-full-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }
        @media (max-width: 992px) { .news-full-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px)  { .news-full-grid { grid-template-columns: 1fr; } }

        .npage-card {
            background: #22222e;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .npage-card:hover {
            transform: translateY(-5px);
            border-color: var(--glow-color, #a855f7);
            box-shadow: 0 0 20px 2px var(--glow-color, #a855f7), 0 10px 30px rgba(0,0,0,0.45);
        }
        .npage-card:hover .npage-title {
            color: #c084fc;
        }
        .npage-img-wrap {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
        }
        .npage-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .npage-card:hover .npage-img-wrap img {
            transform: scale(1.04);
        }
        .npage-body {
            padding: 16px 18px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .npage-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .npage-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 999px;
            background: #7c3aed;
            color: white;
        }
        .npage-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .npage-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            line-height: 1.35;
            margin-bottom: 7px;
            transition: color 0.2s;
        }
        .npage-desc {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.55;
            margin: 0;
            flex: 1;
        }

        /* Empty state */
        .news-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.35);
        }
        .news-empty i { font-size: 2.5rem; margin-bottom: 14px; display: block; }
        .news-empty p { font-size: 0.92rem; }

        /* Page animation */
        @keyframes cardFadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .npage-card {
            opacity: 0;
            animation: cardFadeUp 0.35s ease forwards;
        }

        /* List view */
        .news-list-view .news-full-grid {
            grid-template-columns: 1fr;
        }
        .news-list-view .npage-card {
            flex-direction: row;
            height: 120px;
        }
        .news-list-view .npage-img-wrap {
            width: 180px;
            height: 120px;
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .news-list-view .npage-card { flex-direction: column; height: auto; }
            .news-list-view .npage-img-wrap { width: 100%; height: 160px; }
        }

        /* Load more */
        .load-more-wrap {
            text-align: center;
            margin-top: 36px;
            padding-bottom: 60px;
        }
        .load-more-btn {
            background: transparent;
            border: 1.5px solid rgba(168,85,247,0.5);
            color: #c084fc;
            border-radius: 999px;
            padding: 10px 36px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.22s;
        }
        .load-more-btn:hover {
            background: rgba(168,85,247,0.15);
            border-color: #a855f7;
            color: white;
        }
        .load-more-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
    </style>
</head>

        </div>
    </div>

    <!-- Search -->

            placeholder="Buscar notícias..."

    </div>

    <!-- Filter pills -->
    <div class="news-page-filters" id="filter-pills">
        <button class="news-page-filter-btn active" data-filter="todos" onclick="selectFilter(this)">Todos</button>

    <p class="news-count-label" id="news-count-label"></p>

    <!-- Grid -->
    <div id="news-grid-wrapper">

    <!-- Load more -->
    <div class="load-more-wrap">
        <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Carregar mais notícias</button>
    </div>

</div>

<!-- Modal Notícia -->
<div class="news-modal-overlay" id="news-modal" onclick="closeNewsModalIfOverlay(event)">
    <div class="news-modal-box">
        <button class="news-modal-close" onclick="closeNewsModal()" aria-label="Fechar">✕</button>
        <div class="news-modal-img-wrap">
            <img id="news-modal-img" src="" alt="">
            <div class="news-modal-img-overlay"></div>
        </div>
        <div class="news-modal-content">
            <div class="news-modal-meta">

            <p class="news-modal-subtitle" id="news-modal-subtitle"></p>

</div>

<!-- Auth Modal -->
<div class="auth-modal-overlay" id="auth-modal" onclick="closeAuthIfOverlay(event)">

        <button class="auth-modal-close" onclick="closeAuthModal()">✕</button>
        <div class="auth-logo">KoreaHub</div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Entrar</button>
            <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Criar conta</button>
        </div>
        <div class="auth-form" id="form-login">

            <p class="auth-switch">Não tem conta? <a href="#" onclick="switchAuthTab('register');return false;">Criar agora</a></p>

        <div class="auth-form" id="form-profile" style="display:none;">

            <button class="auth-logout-btn" onclick="handleLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Sair da conta
            </button>
        </div>
        <div class="auth-error" id="auth-error"></div>
    </div>
</div>

<!-- Toast -->

</div>

/* =============================================
   STATE
============================================= */
let currentFilter = 'todos';
let currentSearch  = '';
let currentView    = 'grid';
let visibleCount   = 6;
const PAGE_SIZE    = 6;

/* =============================================
   FILTER + SEARCH
============================================= */
function getFiltered() {
    let list = allNewsData;
    if (currentFilter !== 'todos') {
        list = list.filter(n => n.category === currentFilter);
    }
    if (currentSearch.trim()) {
        const q = currentSearch.toLowerCase();
        list = list.filter(n =>
            n.title.toLowerCase().includes(q) ||
            n.desc.toLowerCase().includes(q) ||
            n.badge.toLowerCase().includes(q)
        );
    }
    return list;
}

function selectFilter(btn) {
    document.querySelectorAll('.news-page-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    visibleCount  = PAGE_SIZE;
    applyFilters();
}

function applyFilters() {
    currentSearch = document.getElementById('news-search').value;
    visibleCount  = PAGE_SIZE;
    renderGrid();
}

/* =============================================
   RENDER
============================================= */
function applyGlowColor(card) {
    const img = card.querySelector('img');
    if (!img) return;
    const run = () => {
        try {
            const canvas = document.createElement('canvas');
            canvas.width = 10; canvas.height = 10;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 10, 10);
            const d = ctx.getImageData(0, 0, 10, 10).data;
            let r=0,g=0,b=0,count=0;
            for(let i=0;i<d.length;i+=4){
                if(d[i]+d[i+1]+d[i+2]>60){r+=d[i];g+=d[i+1];b+=d[i+2];count++;}
            }
            if(count>0){r=Math.round(r/count);g=Math.round(g/count);b=Math.round(b/count);}
            card.style.setProperty('--glow-color',`rgba(${r},${g},${b},0.8)`);
        } catch(e) { card.style.setProperty('--glow-color','#a855f7'); }
    };
    if(img.complete) run(); else img.addEventListener('load', run);
}

function renderGrid() {
    const filtered = getFiltered();
    const slice    = filtered.slice(0, visibleCount);
    const grid     = document.getElementById('npage-grid');
    const label    = document.getElementById('news-count-label');
    const loadBtn  = document.getElementById('load-more-btn');

    label.innerHTML = `<strong>${filtered.length}</strong> notícia${filtered.length !== 1 ? 's' : ''} encontrada${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="news-empty">
                <i class="fa-regular fa-newspaper"></i>
                <p>Nenhuma notícia encontrada para esta busca.</p>
            </div>`;
        loadBtn.style.display = 'none';
        return;
    }

    grid.innerHTML = slice.map((n, i) => `
        <div class="npage-card" style="animation-delay:${(i % PAGE_SIZE) * 0.05}s" data-index="${filtered.indexOf(n)}">
            <div class="npage-img-wrap">
                <img src="${n.img}" alt="${n.title}" crossorigin="anonymous">
            </div>
            <div class="npage-body">
                <div class="npage-meta">
                    <span class="npage-badge">${n.badge}</span>
                    <span class="npage-time"><i class="fa-regular fa-clock"></i> ${n.time}</span>
                </div>
                <p class="npage-title">${n.title}</p>
                <p class="npage-desc">${n.desc}</p>
            </div>
        </div>
    `).join('');

    // glow color + click
    grid.querySelectorAll('.npage-card').forEach((card, i) => {
        applyGlowColor(card);
        card.addEventListener('click', () => openNewsModal(slice[i]));
    });

    // load more button
    loadBtn.style.display = visibleCount >= filtered.length ? 'none' : 'inline-block';
}

function loadMore() {
    visibleCount += PAGE_SIZE;
    renderGrid();
}

/* =============================================
   VIEW TOGGLE
============================================= */
function setView(mode) {
    currentView = mode;
    const wrapper = document.getElementById('news-grid-wrapper');
    const btnGrid = document.getElementById('btn-grid-view');
    const btnList = document.getElementById('btn-list-view');

    if (mode === 'list') {
        wrapper.classList.add('news-list-view');
        btnList.classList.add('active');
        btnGrid.classList.remove('active');
    } else {
        wrapper.classList.remove('news-list-view');
        btnGrid.classList.add('active');
        btnList.classList.remove('active');
    }
    renderGrid();
}

/* =============================================
   NEWS MODAL
============================================= */
function openNewsModal(news) {
    document.getElementById('news-modal-img').src = news.img;
    document.getElementById('news-modal-badge').textContent = news.badge;
    document.getElementById('news-modal-badge').className = 'news-badge ' + (news.badgeClass || 'badge-comebacks');
    document.getElementById('news-modal-time').textContent = news.time;
    document.getElementById('news-modal-title').textContent = news.title;
    document.getElementById('news-modal-subtitle').textContent = news.desc;
    document.getElementById('news-modal-body').innerHTML = news.fullContent || `<p>${news.desc}</p>`;
    document.getElementById('news-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeNewsModal() {
    document.getElementById('news-modal').classList.remove('open');
    document.body.style.overflow = '';
}

function closeNewsModalIfOverlay(e) {
    if (e.target === document.getElementById('news-modal')) closeNewsModal();
}

/* =============================================
   AUTH SYSTEM
============================================= */
let currentUser = JSON.parse(localStorage.getItem('koreahub_user') || 'null');

function updateNavProfile() {
    const icon = document.getElementById('nav-profile-icon');
    if (!icon) return;
    if (currentUser) {
        icon.className = 'fa-solid fa-circle-user';
        icon.style.background = 'linear-gradient(135deg,#a855f7,#6366f1)';
        icon.style.webkitBackgroundClip = 'text';
        icon.style.webkitTextFillColor = 'transparent';
    } else {
        icon.className = 'fa-regular fa-circle-user';
        icon.style.background = '';
        icon.style.webkitBackgroundClip = '';
        icon.style.webkitTextFillColor = '';
    }
}

function openAuthModal() {
    const overlay = document.getElementById('auth-modal');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('auth-error').textContent = '';
    if (currentUser) {
        showAuthForm('profile');
        document.getElementById('profile-name-display').textContent = currentUser.name;
        document.getElementById('profile-email-display').textContent = currentUser.email;
    } else {
        showAuthForm('login');
    }
}

function closeAuthModal() {
    document.getElementById('auth-modal').classList.remove('open');
    document.body.style.overflow = '';
}

function closeAuthIfOverlay(e) {
    if (e.target === document.getElementById('auth-modal')) closeAuthModal();
}

function switchAuthTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    showAuthForm(tab);
    document.getElementById('auth-error').textContent = '';
}

function showAuthForm(form) {
    ['login','register','profile'].forEach(f => {
        document.getElementById('form-' + f).style.display = f === form ? 'block' : 'none';
    });
    document.querySelector('.auth-tabs').style.display = form === 'profile' ? 'none' : 'flex';
}

function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
}

function setAuthError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
}

function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    if (!email || !pass) { setAuthError('Preencha todos os campos.'); return; }
    const users = JSON.parse(localStorage.getItem('koreahub_users') || '[]');
    const user  = users.find(u => u.email === email && u.password === pass);
    if (!user) { setAuthError('E-mail ou senha incorretos.'); return; }
    currentUser = { name: user.name, email: user.email };
    localStorage.setItem('koreahub_user', JSON.stringify(currentUser));
    updateNavProfile();
    showAuthForm('profile');
    document.getElementById('profile-name-display').textContent = currentUser.name;
    document.getElementById('profile-email-display').textContent = currentUser.email;
    document.getElementById('auth-error').textContent = '';
    showToast('✓ Bem-vindo(a), ' + currentUser.name + '!');
}

function handleRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-password').value;
    const pass2 = document.getElementById('reg-password2').value;
    if (!name || !email || !pass || !pass2) { setAuthError('Preencha todos os campos.'); return; }
    if (pass.length < 6) { setAuthError('A senha deve ter pelo menos 6 caracteres.'); return; }
    if (pass !== pass2) { setAuthError('As senhas não coincidem.'); return; }
    const users = JSON.parse(localStorage.getItem('koreahub_users') || '[]');
    if (users.find(u => u.email === email)) { setAuthError('Este e-mail já está cadastrado.'); return; }
    users.push({ name, email, password: pass });
    localStorage.setItem('koreahub_users', JSON.stringify(users));
    currentUser = { name, email };
    localStorage.setItem('koreahub_user', JSON.stringify(currentUser));
    updateNavProfile();
    showAuthForm('profile');
    document.getElementById('profile-name-display').textContent = currentUser.name;
    document.getElementById('profile-email-display').textContent = currentUser.email;
    document.getElementById('auth-error').textContent = '';
    showToast('✓ Conta criada com sucesso!');
}

function handleLogout() {
    currentUser = null;
    localStorage.removeItem('koreahub_user');
    updateNavProfile();
    closeAuthModal();
    showToast('Você saiu da conta.');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

/* =============================================
   NAVBAR SCROLL
============================================= */
const navbar = document.querySelector('.navbar');
window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 10);
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAuthModal(); closeNewsModal(); }
});

/* =============================================
   INIT
============================================= */
updateNavProfile();
renderGrid();
</script>
